version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newscore_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - newscore_network

  nginx:
    image: nginx:alpine
    container_name: newscore_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - newscore_network

  db:
    image: mysql:8.0
    container_name: newscore_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: newscore
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: newscore
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - newscore_network

  redis:
    image: redis:alpine
    container_name: newscore_redis
    restart: unless-stopped
    networks:
      - newscore_network

volumes:
  db_data:

networks:
  newscore_network:
    driver: bridge